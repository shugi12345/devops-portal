    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "600m"
    memory: "512Mi"
env:
  REPORT_CACHE: "true"
route:
  host: reports-preprod-new.apps.example.local
featureFlags:
  csvExport: true
